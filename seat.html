<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Seats (Real-Time)</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; margin: 0; padding-bottom: 50px; }
.header { background: #ff7a00; color: white; padding: 15px; text-align: center; font-weight: bold; }
#seats { display: grid; grid-template-columns: repeat(4, 60px); gap: 12px; justify-content: center; margin-top: 30px; }
.seat { height: 50px; border-radius: 10px; background: #ddd; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; transition: 0.2s; }
.booked { background: #ff4d4d; cursor: not-allowed; color: white; }
.selected { background: #28a745; color: white; border: 2px solid #1e7e34; }
.footer-action { text-align: center; margin-top: 30px; }
button { padding: 12px 40px; background: #ff7a00; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
button:hover { background: #e66e00; }
</style>
</head>
<body>

<div class="header" id="route">Loading route...</div>
<div id="seats"></div>

<div class="footer-action">
    <button id="bookBtn">Book Selected Seat</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ---------------- FIREBASE CONFIG ----------------
const firebaseConfig = {
  apiKey: "AIzaSyCHkQ5k5wKEommWakTm09mCtcJxsRdgJIk",
  authDomain: "dreamliner-421b0.firebaseapp.com",
  projectId: "dreamliner-421b0",
  storageBucket: "dreamliner-421b0.firebasestorage.app",
  messagingSenderId: "454472970770",
  appId: "1:454472970770:web:cbf95c8b7523f24f2b5ecb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---------------- URL PARAMS ----------------
const params = new URLSearchParams(window.location.search);
const busId = params.get("busId");
const from = params.get("from");
const to = params.get("to");
const date = params.get("date");

document.getElementById("route").innerText = `${from} → ${to} | ${date}`;

// ---------------- SEATS ----------------
const allSeats = ["A1","A2","A3","A4","B1","B2","B3","B4","C1","C2","C3","C4"];
let selectedSeat = null;

// ---------------- LOAD SEATS ----------------
function renderSeats(bookedSeats) {
    const container = document.getElementById("seats");
    container.innerHTML = "";

    allSeats.forEach(seat => {
        const div = document.createElement("div");
        div.className = "seat";
        div.innerText = seat;

        if (bookedSeats[seat] === "booked") {
            div.classList.add("booked");
        } else {
            div.addEventListener("click", () => {
                document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));
                div.classList.add("selected");
                selectedSeat = seat;
            });
        }

        container.appendChild(div);
    });
}

// ---------------- REAL-TIME LISTENER ----------------
const docRef = doc(db, "buses", busId);
onSnapshot(docRef, (docSnap) => {
    const bookedSeats = docSnap.exists() ? docSnap.data().seats : {};
    renderSeats(bookedSeats);
    // If selected seat is booked by someone else, deselect it
    if (selectedSeat && bookedSeats[selectedSeat] === "booked") {
        selectedSeat = null;
        alert("The seat you selected was just booked by someone else!");
    }
});

// ---------------- BOOK SEAT ----------------
async function bookSeat() {
    if (!selectedSeat) {
        alert("Please select a seat first!");
        return;
    }

    try {
        // Get latest data snapshot
        const latestDocSnap = await docRef.get();
        const seats = latestDocSnap.exists() ? latestDocSnap.data().seats : {};

        if (seats[selectedSeat] === "booked") {
            alert("This seat was just booked by someone else!");
            selectedSeat = null;
            return;
        }

        seats[selectedSeat] = "booked";
        await setDoc(docRef, { seats }, { merge: true });

        alert(`Seat ${selectedSeat} booked successfully!`);
        selectedSeat = null;

    } catch (err) {
        console.error(err);
        alert("Error booking seat. Check Firestore rules.");
    }
}

// ---------------- ATTACH BUTTON ----------------
document.getElementById("bookBtn").addEventListener("click", bookSeat);
</script>

</body>
</html>
