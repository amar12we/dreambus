<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Seats (AM/PM Trips)</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; margin: 0; padding-bottom: 50px; }
.header { background: #ff7a00; color: white; padding: 15px; text-align: center; font-weight: bold; }
#seats { display: grid; grid-template-columns: repeat(4, 60px); gap: 12px; justify-content: center; margin-top: 30px; }
.seat { height: 50px; border-radius: 10px; background: #ddd; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; transition: 0.2s; }
.booked { background: #ff4d4d; cursor: not-allowed; color: white; }
.selected { background: #28a745; color: white; border: 2px solid #1e7e34; }
.footer-action { text-align: center; margin-top: 20px; }
button { padding: 12px 40px; background: #ff7a00; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
button:hover { background: #e66e00; }
input { padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin-top: 10px; width: 250px; }
</style>
</head>
<body>

<div class="header" id="route">Loading route...</div>
<div id="seats"></div>

<div class="footer-action">
    <input type="email" id="customerEmail" placeholder="Enter your email" required />
    <br>
    <button id="bookBtn">Book Selected Seat</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ---------------- FIREBASE CONFIG ----------------
const firebaseConfig = {
  apiKey: "AIzaSyCHkQ5k5wKEommWakTm09mCtcJxsRdgJIk",
  authDomain: "dreamliner-421b0.firebaseapp.com",
  projectId: "dreamliner-421b0",
  storageBucket: "dreamliner-421b0.appspot.com",
  messagingSenderId: "454472970770",
  appId: "1:454472970770:web:cbf95c8b7523f24f2b5ecb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---------------- URL PARAMS ----------------
const params = new URLSearchParams(window.location.search);
const from = params.get("from") || "Start";
const to = params.get("to") || "End";
const date = params.get("date") || "Today";
const trip = (params.get("trip") || "AM").toUpperCase();

// ---------------- DOCUMENT PER DATE + TRIP ----------------
// Each date & trip combination has its own document
const busDocId = `${date}_${trip}`;  // e.g., "2026-03-20_AM"
const docRef = doc(db, "buses", busDocId);

// ---------------- HEADER ----------------
document.getElementById("route").innerText = `${from} → ${to} | ${date} | ${trip} Trip`;

// ---------------- SEATS ----------------
const allSeats = ["A1","A2","A3","A4","B1","B2","B3","B4","C1","C2","C3","C4"];
let selectedSeat = null;

// ---------------- RENDER SEATS ----------------
function renderSeats(bookedSeats){
    const container = document.getElementById("seats");
    container.innerHTML = "";
    allSeats.forEach(seat=>{
        const div = document.createElement("div");
        div.className = "seat";
        div.innerText = seat;

        if(bookedSeats && bookedSeats[seat]?.status === "booked"){
            div.classList.add("booked");
        } else {
            div.addEventListener("click", () => {
                document.querySelectorAll(".seat").forEach(s => s.classList.remove("selected"));
                div.classList.add("selected");
                selectedSeat = seat;
            });
        }

        container.appendChild(div);
    });
}

// ---------------- REAL-TIME LISTENER ----------------
onSnapshot(docRef, (docSnap) => {
    const bookedSeats = docSnap.exists() ? docSnap.data().seats : {};
    renderSeats(bookedSeats);

    if(selectedSeat && bookedSeats[selectedSeat]?.status === "booked"){
        selectedSeat = null;
        alert("The seat you selected was just booked by someone else!");
    }
});

// ---------------- BOOK SEAT FUNCTION ----------------
async function bookSeat(){
    const emailInput = document.getElementById("customerEmail").value.trim();
    if(!emailInput){ alert("Please enter your email!"); return; }
    if(!selectedSeat){ alert("Please select a seat!"); return; }

    try{
        const docSnap = await getDoc(docRef);
        let seats = docSnap.exists() ? docSnap.data().seats : {};

        // Check if seat already booked
        if(seats[selectedSeat]?.status === "booked"){
            alert("This seat was just booked by someone else!");
            selectedSeat = null;
            return;
        }

        // Store each user's route inside the seat
        seats[selectedSeat] = {
            status: "booked",
            customerEmail: emailInput,
            from: from,
            to: to,
            timestamp: new Date().toISOString()
        };

        await setDoc(docRef, { seats }, { merge: true });

        alert(`Seat ${selectedSeat} booked successfully!`);
        selectedSeat = null;
        document.getElementById("customerEmail").value = "";
    } catch(err){
        console.error("Booking error:", err);
        alert("Error booking seat. Check Firestore permissions.");
    }
}

document.getElementById("bookBtn").addEventListener("click", bookSeat);
</script>

</body>
</html>
