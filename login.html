<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamliner Signup</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyCHkQ5k5wKEommWakTm09mCtcJxsRdgJIk",
    authDomain: "dreamliner-421b0.firebaseapp.com",
    projectId: "dreamliner-421b0",
    storageBucket: "dreamliner-421b0.appspot.com",
    messagingSenderId: "454472970770",
    appId: "1:454472970770:web:cbf95c8b7523f24f2b5ecb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let confirmationResult;

// Initialize invisible reCAPTCHA
window.onload = () => {
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' });
};

window.sendOTP = async function() {
    const phone = document.getElementById('phone').value.trim();
    if (!phone) { 
        alert("Please enter your phone number."); 
        return; 
    }

    try {
        confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
        document.getElementById('otp-section').style.display = 'block';
        document.getElementById('send-btn').style.display = 'none';
        alert("OTP sent to " + phone);
    } catch (err) {
        console.error("Error sending OTP:", err);
        alert("Failed to send OTP: " + err.message);
    }
}

window.verifyOTP = async function() {
    const otp = document.getElementById('otp').value.trim();
    if (!otp) { alert("Please enter the OTP."); return; }

    try {
        const result = await confirmationResult.confirm(otp);
        const user = result.user;

        // Save phone to Firestore
        try {
            const userRef = doc(db, "users", user.uid);
            await setDoc(userRef, {
                phone: user.phoneNumber,
                createdAt: new Date()
            });

            alert("Signup successful!");
            
            /* --- KEY FEATURE START --- */
            // This notifies the top-level window (index.html) that login is done
            // It works even if this page is inside an iframe.
            window.top.postMessage("loginSuccess", "*"); 
            /* --- KEY FEATURE END --- */

        } catch (dbError) {
            console.error("Firestore Error:", dbError);
            alert("Account created, but failed to save details to database.");
        }

    } catch (authError) {
        console.error("Verification Error:", authError);
        alert("Invalid OTP. Please try again.");
    }
}
</script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #f8f9fa;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 40px 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 350px;
    text-align: center;
}

h2 {
    color: #ff7a00;
    margin-bottom: 25px;
    font-size: 24px;
    font-weight: 700;
}

.input-group {
    margin-bottom: 20px;
}

.input-group input {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
    outline: none;
    box-sizing: border-box;
    transition: border 0.3s;
}

.input-group input:focus {
    border-color: #ff7a00;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: #ff7a00;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s;
}

button:hover {
    background: #e66e00;
}

#otp-section {
    display: none;
    margin-top: 20px;
    border-top: 1px solid #eee;
    padding-top: 20px;
}

#recaptcha-container {
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">
    <h2>Signup with Phone</h2>
    <div class="input-group">
        <input type="text" id="phone" placeholder="+91XXXXXXXXXX" />
    </div>
    <button id="send-btn" onclick="sendOTP()">Send OTP</button>

    <div id="otp-section">
        <div class="input-group">
            <input type="number" id="otp" placeholder="Enter OTP" />
        </div>
        <button onclick="verifyOTP()">Verify & Finish</button>
    </div>

    <div id="recaptcha-container"></div>
</div>

</body>
</html>
