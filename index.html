<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamliner Login</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
    apiKey:"AIzaSyCHkQ5k5wKEommWakTm09mCtcJxsRdgJIk",
    authDomain:"dreamliner-421b0.firebaseapp.com",
    projectId:"dreamliner-421b0",
    storageBucket:"dreamliner-421b0.appspot.com",
    messagingSenderId:"454472970770",
    appId:"1:454472970770:web:cbf95c8b7523f24f2b5ecb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let recaptchaVerifier;

// Send OTP
window.sendOTP = async function() {
    const phone = document.getElementById('phone').value.trim();
    const username = document.getElementById('username').value.trim();
    const age = document.getElementById('age').value.trim();

    if (!username || !age || !phone) { alert("Fill all fields"); return; }
    if (!phone.startsWith('+')) { alert("Use format +91XXXXXXXXXX"); return; }

    try {
        // Initialize reCAPTCHA here dynamically
        recaptchaVerifier = new RecaptchaVerifier('recaptcha-container', {
            'size': 'invisible',
            'callback': () => { console.log("reCAPTCHA verified"); }
        }, auth);

        const confirmationResult = await signInWithPhoneNumber(auth, phone, recaptchaVerifier);
        window.confirmationResult = confirmationResult;

        document.getElementById('otp-section').style.display = 'block';
        document.getElementById('send-btn').disabled = true;
        alert("OTP sent to " + phone);
    } catch (err) {
        console.error("Error sending OTP:", err);
        alert("Failed to send OTP: " + err.message);
    }
}

// Verify OTP
window.verifyOTP = async function() {
    const otp = document.getElementById('otp').value.trim();
    const username = document.getElementById('username').value.trim();
    const age = document.getElementById('age').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!otp) { alert("Enter OTP"); return; }

    try {
        const result = await window.confirmationResult.confirm(otp);
        const user = result.user;

        await setDoc(doc(db, "users", user.uid), { username, age, phone });
        alert("Login successful! Welcome " + username);
    } catch (err) {
        console.error("OTP verification failed:", err);
        alert("Invalid OTP, try again");
    }
}
</script>

<style>
body { font-family:'Segoe UI',sans-serif; margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background: linear-gradient(135deg,#ff7a00,#ffb347);}
.container { background:white; padding:40px 30px; border-radius:16px; width:360px; text-align:center; box-shadow:0 12px 28px rgba(0,0,0,0.3);}
h2 { color:#ff7a00; margin-bottom:30px;}
.input-group { position:relative; margin-bottom:20px;}
.input-group input { width:100%; padding:14px 12px; border:1px solid #ccc; border-radius:8px; font-size:14px; outline:none; transition:border-color 0.3s;}
.input-group label { position:absolute; top:50%; left:12px; transform:translateY(-50%); background:white; padding:0 4px; color:#aaa; pointer-events:none; transition:0.2s;}
.input-group input:focus { border-color:#ff7a00;}
.input-group input:focus + label, .input-group input:not(:placeholder-shown) + label { top:-10px; font-size:12px; color:#ff7a00;}
button { width:100%; padding:14px; border:none; border-radius:8px; background:#ff7a00; color:white; font-size:16px; cursor:pointer; transition: background 0.3s; margin-top:10px;}
button:hover { background:#ff9500;}
#otp-section { display:none; margin-top:10px;}
</style>
</head>

<body>
<div class="container">
    <h2>Dreamliner Login</h2>

    <div class="input-group">
        <input type="text" id="username" placeholder=" " />
        <label>Username</label>
    </div>
    <div class="input-group">
        <input type="number" id="age" placeholder=" " />
        <label>Age</label>
    </div>
    <div class="input-group">
        <input type="text" id="phone" placeholder=" " />
        <label>Phone (+91XXXXXXXXXX)</label>
    </div>

    <button id="send-btn" onclick="sendOTP()">Send OTP</button>

    <div id="otp-section">
        <div class="input-group">
            <input type="number" id="otp" placeholder=" " />
            <label>Enter OTP</label>
        </div>
        <button onclick="verifyOTP()">Verify OTP</button>
    </div>

    <div id="recaptcha-container"></div>
</div>
</body>
</html>
