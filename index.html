<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamliner Login</title>

<style>
body{
font-family:Segoe UI;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff7a00,#ffb347);
}

.container{
background:white;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
color:#ff7a00;
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#ff7a00;
border:none;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff9500;
}

#otpSection{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Dreamliner Login</h2>

<input type="text" id="phone" placeholder="+91XXXXXXXXXX">

<button onclick="sendOTP()">Send OTP</button>

<div id="otpSection">

<input type="text" id="otp" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify OTP</button>

</div>

<div id="recaptcha-container"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getAuth,
RecaptchaVerifier,
signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
getFirestore,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
apiKey:"AIzaSyCHkQ5k5wKEommWakTm09mCtcJxsRdgJIk",
authDomain:"dreamliner-421b0.firebaseapp.com",
projectId:"dreamliner-421b0",
storageBucket:"dreamliner-421b0.appspot.com",
messagingSenderId:"454472970770",
appId:"1:454472970770:web:cbf95c8b7523f24f2b5ecb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let confirmationResult;


window.onload = function(){

window.recaptchaVerifier = new RecaptchaVerifier(auth,'recaptcha-container',{
size:'invisible'
});

}


window.sendOTP = async function(){

const phone = document.getElementById("phone").value;

if(!phone){

alert("Enter phone number");

return;

}

try{

const appVerifier = window.recaptchaVerifier;

confirmationResult = await signInWithPhoneNumber(auth,phone,appVerifier);

document.getElementById("otpSection").style.display="block";

alert("OTP sent");

}

catch(error){

alert(error.message);

console.log(error);

}

}


window.verifyOTP = async function(){

const otp = document.getElementById("otp").value;

if(!otp){

alert("Enter OTP");

return;

}

try{

const result = await confirmationResult.confirm(otp);

const user = result.user;


const userRef = doc(db,"users",user.uid);

const userSnap = await getDoc(userRef);


if(!userSnap.exists()){

await setDoc(userRef,{
phone:user.phoneNumber,
createdAt:new Date()
});

}


alert("Login Successful");


window.location.href="home.html";


}

catch(error){

alert("Invalid OTP");

}

}

</script>

</body>
</html>
