<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamliner - Available Buses</title>
    <style>
        :root {
            --primary: #ff7a00;
            --secondary: #ff512f;
            --text-dark: #1a1a1a;
            --text-light: #757575;
            --bg-gray: #f4f7f8;
            --success: #16a34a;
            --success-bg: #f0fdf4;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            color: var(--text-dark);
        }

        /* PREMIUM HEADER */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(255, 81, 47, 0.2);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-right: 15px;
        }

        .route-container { display: flex; flex-direction: column; }
        #routeHeader { font-size: 17px; font-weight: 700; }
        #routeDate { font-size: 12px; opacity: 0.9; }

        /* BUS CARD */
        .bus-card {
            background: white;
            margin: 15px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            border: 1px solid #eee;
        }

        .brand-section { margin-bottom: 20px; }
        .brand-name { font-size: 19px; font-weight: 800; color: var(--text-dark); letter-spacing: 0.3px; }
        .bus-type { font-size: 13px; color: var(--text-light); display: block; margin-top: 2px; }

        /* JOURNEY VISUALS */
        .journey-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .time-box {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 12px;
            min-width: 80px;
            text-align: center;
            border: 1px solid #f0f0f0;
        }

        .time { font-size: 18px; font-weight: 800; color: #000; display: block; }
        .location { font-size: 11px; color: var(--text-light); font-weight: 700; margin-top: 4px; display: block; text-transform: uppercase; }

        .duration-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 10px;
        }

        .duration-text { font-size: 11px; color: var(--text-light); font-weight: 700; margin-bottom: 5px; }
        .line-visual { height: 2px; background: #e0e0e0; width: 80%; position: relative; }
        .line-visual::after {
            content: "\f206";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 0 5px;
            font-size: 12px;
            color: #ccc;
        }

        .seat-tag {
            font-size: 11px;
            font-weight: 800;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        /* FOOTER & ACTION AREA */
        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f8f9fa;
            padding-top: 15px;
            margin-top: 10px;
        }

        .status-box {
            background: var(--success-bg);
            border: 1px solid rgba(22, 163, 74, 0.2);
            padding: 6px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
        }
        .status-text {
            font-size: 12px;
            font-weight: 700;
            color: var(--success);
            text-transform: uppercase;
        }

        .action-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .fare-info {
            text-align: right;
        }

        .fare-label { font-size: 10px; color: var(--text-light); font-weight: 700; display: block; }
        .fare-amount { font-size: 20px; font-weight: 900; color: var(--text-dark); }

        .book-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 122, 0, 0.25);
            transition: 0.2s;
            text-transform: uppercase;
        }

        .book-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="window.history.back()"><i class="fas fa-chevron-left"></i></button>
    <div class="route-container">
        <div id="routeHeader">...</div>
        <div id="routeDate">...</div>
    </div>
</div>

<div id="busList"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCHkQ5k5wKEommWakTm09mCtcJxsRdgJIk",
    authDomain: "dreamliner-421b0.firebaseapp.com",
    projectId: "dreamliner-421b0",
    storageBucket: "dreamliner-421b0.appspot.com",
    messagingSenderId: "454472970770",
    appId: "1:454472970770:web:cbf95c8b7523f24f2b5ecb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const from = params.get("from") || "";
const to = params.get("to") || "";
const date = params.get("date") || "";
const womenSafety = params.get("womenSafety") || "false"; // Retrieve current toggle state

document.getElementById("routeHeader").innerText = `${from} → ${to}`;
document.getElementById("routeDate").innerText = date;

const routes = [
    {
        from: "Guwahati",
        to: "Biswanath Charali",
        fare: 100,
        capacity: 45,
        busName: "DREAMLINER",
        busType: "Mercedes-Benz 2X2 Semi Sleeper",
        dept: "05:00 PM",
        arr: "09:00 PM"
    },
    {
        from: "Biswanath Charali",
        to: "Guwahati",
        fare: 465,
        capacity: 45,
        busName: "DREAMLINER",
        busType: "Mercedes-Benz 2X2 Semi Sleeper",
        dept: "05:00 AM",
        arr: "09:00 AM"
    }
];

function calculateDuration(start, end) {
    const parse = (t) => {
        let [time, mod] = t.split(' ');
        let [h, m] = time.split(':').map(Number);
        if (h === 12) h = 0;
        if (mod === 'PM') h += 12;
        return h * 60 + m;
    };
    let d = parse(end) - parse(start);
    if (d < 0) d += 1440;
    return `${Math.floor(d/60)}h ${d%60}m`;
}

const matched = routes.find(r => r.from === from && r.to === to);

if (matched) {
    const trip = matched.dept.includes("PM") ? "PM" : "AM";
    const dbPath = `${date}_${trip}`;
    
    const card = document.createElement("div");
    card.className = "bus-card";
    card.innerHTML = `
        <div class="brand-section">
            <span class="brand-name">${matched.busName}</span>
            <span class="bus-type">${matched.busType}</span>
        </div>

        <div class="journey-row">
            <div class="time-box">
                <span class="time">${matched.dept}</span>
                <span class="location">${matched.from}</span>
            </div>

            <div class="duration-container">
                <span class="duration-text">${calculateDuration(matched.dept, matched.arr)}</span>
                <div class="line-visual"></div>
                <span class="seat-tag" id="avail-txt">Checking...</span>
            </div>

            <div class="time-box">
                <span class="time">${matched.arr}</span>
                <span class="location">${matched.to}</span>
            </div>
        </div>

        <div class="footer-row">
            <div class="status-box">
                <div class="status-dot"></div>
                <span class="status-text">On Time</span>
            </div>

            <div class="action-area">
                <div class="fare-info">
                    <span class="fare-label">Fare</span>
                    <span class="fare-amount">₹${matched.fare}</span>
                </div>
                <button class="book-btn" id="bookBtn">View Seats</button>
            </div>
        </div>
    `;
    document.getElementById("busList").appendChild(card);

    let unsubscribe; 

    function startListening() {
        if (unsubscribe) unsubscribe();

        unsubscribe = onSnapshot(doc(db, "buses", dbPath), (snap) => {
            let booked = 0;
            if (snap.exists()) {
                const data = snap.data();
                const seatSource = data.seats ? data.seats : data;
                booked = Object.keys(seatSource).filter(key => /^[A-Z]\d+$/.test(key)).length;
            }

            const avail = matched.capacity - booked;
            const txt = document.getElementById("avail-txt");

            if (avail <= 0) {
                txt.innerText = "Sold Out";
                txt.style.color = "#dc3545";
                txt.style.background = "#fff1f2";
            } else {
                txt.innerText = `${avail} Seats`;
                txt.style.color = avail < 10 ? "#dc3545" : "#16a34a";
                txt.style.background = avail < 10 ? "#fff1f2" : "#f0fdf4";
            }
        });
    }

    window.addEventListener('pageshow', (event) => {
        startListening();
    });

    // FIXED: The redirection now correctly includes the womenSafety parameter
    document.getElementById("bookBtn").onclick = () => {
        window.location.href = `seat.html?from=${from}&to=${to}&date=${date}&trip=${trip}&fare=${matched.fare}&womenSafety=${womenSafety}`;
    };
}
</script>
</body>
</html>
