<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamliner Dashboard</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f2f2f2; }
        
        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 18px; background: linear-gradient(to right, #ff7a00, #ff512f);
            color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.25);
        }
        .logo { font-weight: bold; font-size: 18px; letter-spacing: 1px; }
        .logout-btn {
            background: white; color: #ff512f; border: none;
            padding: 6px 16px; border-radius: 20px; font-weight: 600; cursor: pointer;
        }

        /* CONTAINER */
        .container { max-width: 420px; margin: auto; padding: 16px; }

        /* CARD */
        .card {
            background: white; border-radius: 18px; padding: 18px;
            margin-bottom: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        /* PROFILE */
        .profile { text-align: center; margin-bottom: 15px; }
        .avatar-container { position: relative; width: 85px; height: 85px; margin: auto; }
        .avatar-img {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
            border: 3px solid #ff7a00; transition: all 0.3s ease; background: #eee;
        }
        .upload-btn {
            position: absolute; bottom: 0; right: 0; background: #ff7a00;
            color: white; width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        #fileInput { display: none; }
        .profile h3 { margin: 10px 0 2px; color: #333; }
        .phone { font-size: 13px; color: #777; }

        /* FORM */
        .info-item { margin-bottom: 12px; }
        .info-item b { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-left: 5px; }
        .info-item input {
            width: 100%; padding: 11px; border-radius: 10px;
            border: 1px solid #eee; margin-top: 4px; font-size: 14px; 
            box-sizing: border-box; background: #fcfcfc;
        }
        .info-item input:focus { border-color: #ff7a00; outline: none; background: #fff; }

        .save-btn {
            width: 100%; background: #ff7a00; color: white; border: none;
            padding: 14px; border-radius: 12px; font-weight: bold;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .save-btn:hover { background: #ff512f; transform: translateY(-1px); }
        .save-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* SUMMARY */
        .summary {
            display: flex; justify-content: space-around; margin-top: 20px;
            background: #f9f9f9; padding: 15px; border-radius: 15px;
        }
        .summary-box { text-align: center; }
        .summary-box span { display: block; font-size: 22px; font-weight: bold; color: #ff512f; }
        .summary-box small { font-size: 11px; color: #999; text-transform: uppercase; font-weight: 600; }

        /* BOOKINGS */
        .history-title { font-size: 17px; font-weight: bold; margin-bottom: 12px; color: #333; }
        .booking-card {
            border: 1px solid #f0f0f0; border-radius: 14px; padding: 14px;
            margin-bottom: 12px; background: #fff;
        }
        .route { font-weight: bold; font-size: 15px; color: #222; }
        .meta { font-size: 13px; color: #666; margin-top: 4px; }
        .status {
            display: inline-block; margin-top: 8px; background: #e8f5e9;
            color: #2e7d32; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
        }
        .booking-id { font-size: 11px; color: #bbb; margin-top: 8px; }
    </style>
</head>

<body>

<div class="header">
    <div class="logo">DREAMLINER</div>
    <button class="logout-btn" id="logoutBtn">Logout</button>
</div>

<div class="container">
    <div class="card">
        <div class="profile">
            <div class="avatar-container">
                <img id="profileImg" class="avatar-img" src="https://via.placeholder.com/80">
                <label for="fileInput" class="upload-btn">📷</label>
                <input type="file" id="fileInput" accept="image/*">
            </div>
            <h3 id="usernameDisplay">Passenger</h3>
            <div class="phone" id="display-phone">Loading...</div>
        </div>

        <div class="info-item"><b>Full Name</b><input id="name" placeholder="Enter Name"></div>
        <div class="info-item"><b>Age</b><input id="age" placeholder="Enter Age"></div>
        <div class="info-item"><b>Address</b><input id="address" placeholder="Enter Address"></div>
        <div class="info-item"><b>Alternate Phone</b><input id="altphone" placeholder="Optional"></div>

        <button class="save-btn" id="saveProfile">Save Profile</button>

        <div class="summary">
            <div class="summary-box"><span id="totalTrips">0</span><small>Trips</small></div>
            <div class="summary-box"><span id="totalSeats">0</span><small>Seats</small></div>
            <div class="summary-box"><span id="totalRoutes">0</span><small>Routes</small></div>
        </div>
    </div>

    <div class="card">
        <div class="history-title">My Bookings</div>
        <div id="history-content">Searching for bookings...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCHkQ5k5wKEommWakTm09mCtcJxsRdgJIk",
        authDomain: "dreamliner-421b0.firebaseapp.com",
        projectId: "dreamliner-421b0",
        // Updated to match your bucket from the screenshot
        storageBucket: "dreamliner-421b0.firebasestorage.app", 
        messagingSenderId: "454472970770",
        appId: "1:454472970770:web:cbf95c8b7523f24f2b5ecb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);

    const phoneSpan = document.getElementById("display-phone");
    const historyBox = document.getElementById("history-content");
    const profileImg = document.getElementById("profileImg");
    const usernameDisplay = document.getElementById("usernameDisplay");

    // --- LOAD PROFILE ---
    async function loadUserProfile(uid) {
        try {
            const docRef = doc(db, "profiles", uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById("name").value = data.name || "";
                document.getElementById("age").value = data.age || "";
                document.getElementById("address").value = data.address || "";
                document.getElementById("altphone").value = data.altphone || "";
                usernameDisplay.innerText = data.name || "Passenger";
                if (data.photoURL) profileImg.src = data.photoURL;
            }
        } catch (e) { console.error("Error loading profile:", e); }
    }

    // --- SAVE TEXT DATA ---
    document.getElementById("saveProfile").onclick = async () => {
        const user = auth.currentUser;
        if(!user) return;
        
        const btn = document.getElementById("saveProfile");
        btn.disabled = true;
        btn.innerText = "Saving...";

        try {
            const nameVal = document.getElementById("name").value;
            await setDoc(doc(db, "profiles", user.uid), {
                name: nameVal,
                age: document.getElementById("age").value,
                address: document.getElementById("address").value,
                altphone: document.getElementById("altphone").value,
                phone: user.phoneNumber
            }, { merge: true });
            
            usernameDisplay.innerText = nameVal || "Passenger";
            alert("Profile Saved!");
        } catch (e) {
            alert("Error saving data: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Save Profile";
        }
    };

    // --- PHOTO UPLOAD (Matches your Rules) ---
    document.getElementById("fileInput").addEventListener("change", async (e) => {
        const file = e.target.files[0];
        const user = auth.currentUser;
        
        if (!file || !user) return;

        // Check file size (optional but recommended: e.g., 2MB limit)
        if (file.size > 2 * 1024 * 1024) {
            alert("File is too large. Please select an image under 2MB.");
            return;
        }

        try {
            profileImg.style.opacity = "0.3"; // Visual loading state
            
            // Path must match your Rules: match /profilePhotos/{userId}
            const storageRef = ref(storage, `profilePhotos/${user.uid}`);
            
            // Upload
            await uploadBytes(storageRef, file);
            
            // Get URL
            const url = await getDownloadURL(storageRef);
            
            // Update UI
            profileImg.src = url;
            
            // Save URL to Firestore
            await setDoc(doc(db, "profiles", user.uid), { 
                photoURL: url 
            }, { merge: true });
            
            alert("Photo Updated Successfully!");
        } catch (error) {
            console.error(error);
            alert("Upload failed. Make sure you clicked 'Publish' on your Firebase Rules!");
        } finally {
            profileImg.style.opacity = "1";
        }
    });

    // --- BOOKING HISTORY ---
    async function loadBookingHistory(uid) {
        try {
            const q = query(collection(db, "bookings"), where("userId", "==", uid));
            const snap = await getDocs(q);

            if (snap.empty) {
                historyBox.innerHTML = "<p style='color:#999; text-align:center;'>No bookings found.</p>";
                return;
            }

            historyBox.innerHTML = "";
            let trips = 0, seats = 0, routes = new Set();

            snap.forEach(docItem => {
                const d = docItem.data();
                trips++;
                seats += (d.seatsSelected ? d.seatsSelected.length : 1);
                routes.add(`${d.from}-${d.to}`);

                historyBox.innerHTML += `
                    <div class="booking-card">
                        <div class="route">${d.from} → ${d.to}</div>
                        <div class="meta">Seat: ${d.seatNumber || 'N/A'}</div>
                        <span class="status">Confirmed</span>
                        <div class="booking-id">Booking ID: ${docItem.id.slice(0, 8)}</div>
                    </div>`;
            });

            document.getElementById("totalTrips").innerText = trips;
            document.getElementById("totalSeats").innerText = seats;
            document.getElementById("totalRoutes").innerText = routes.size;
        } catch (e) {
            historyBox.innerHTML = "Error loading history.";
        }
    }

    // --- AUTH OBSERVER ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            phoneSpan.textContent = user.phoneNumber;
            loadUserProfile(user.uid);
            loadBookingHistory(user.uid);
        } else {
            // Redirect to login if not logged in
            window.location.href = "index.html";
        }
    });

    // --- LOGOUT ---
    document.getElementById("logoutBtn").onclick = () => {
        signOut(auth).then(() => {
            localStorage.setItem("isLoggedIn", "false"); // RESET LOGIN STATE
            window.location.href = "index.html";
        });
    };
</script>
</body>
</html>
